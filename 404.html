<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — BridgetOS</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #030712;
        color: #f9fafb;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        background-image: radial-gradient(circle, rgba(99,102,241,0.10) 1px, transparent 1px);
        background-size: 28px 28px;
      }
      .glow {
        position: fixed; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(99,102,241,0.12) 0%, transparent 70%);
      }
      .card {
        position: relative;
        background: rgba(10,12,26,0.9);
        border: 1px solid rgba(99,102,241,0.2);
        border-radius: 1.25rem;
        padding: 3rem 2.5rem;
        max-width: 440px;
        width: 100%;
        box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      }
      .badge {
        display: inline-flex; align-items: center; gap: 6px;
        background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
        color: #a5b4fc; border-radius: 9999px; padding: 4px 12px;
        font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
        text-transform: uppercase; margin-bottom: 1.5rem;
      }
      .dot { width: 6px; height: 6px; border-radius: 50%; background: #818cf8; }
      h1 { font-size: 4rem; font-weight: 900; letter-spacing: -0.04em; color: #fff; margin-bottom: 0.25rem; }
      h2 { font-size: 1.1rem; font-weight: 700; color: #e5e7eb; margin-bottom: 0.75rem; }
      p  { font-size: 0.875rem; color: #6b7280; line-height: 1.6; margin-bottom: 2rem; }
      .actions { display: flex; flex-direction: column; gap: 0.625rem; }
      a.primary {
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        padding: 0.75rem 1.5rem; border-radius: 0.75rem;
        background: #4f46e5; color: #fff; font-size: 0.875rem; font-weight: 600;
        text-decoration: none; transition: background 0.15s;
      }
      a.primary:hover { background: #6366f1; }
      a.secondary {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 0.75rem 1.5rem; border-radius: 0.75rem;
        border: 1px solid rgba(255,255,255,0.08); color: #9ca3af; font-size: 0.875rem;
        text-decoration: none; transition: all 0.15s;
      }
      a.secondary:hover { border-color: rgba(255,255,255,0.2); color: #e5e7eb; }
      .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.7rem; color: rgba(99,102,241,0.5); margin-top: 1.5rem; }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="card">
      <div class="badge"><div class="dot"></div> BridgetOS</div>
      <h1>404</h1>
      <h2>Page not found.</h2>
      <p>
        This URL doesn't exist or the page has moved.
        Head back to the main site or join the waitlist.
      </p>
      <div class="actions">
        <a class="primary" href="/">← Back to BridgetOS</a>
        <a class="secondary" href="/#waitlist">Join the Waitlist</a>
      </div>
      <p class="mono">DRIFT_BAND: NOT_FOUND · SEV: 0 · STATE: NORMAL</p>
    </div>
  </body>
</html>
